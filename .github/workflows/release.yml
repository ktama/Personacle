# v* タグの push でリリースビルドを実行し、ドラフトリリースを作成する。
# 手順 (docs/licensing.md のリリースチェックリストに対応):
#   1. インストーラ (NSIS/MSI) のビルドとドラフトリリースへの添付 — tauri-action
#   2. サードパーティライセンス本文 (THIRD_PARTY_LICENSES.html) の生成と添付
#   3. 公開はドラフトを人が確認してから行う (リリースノートは docs/release-notes-*.md を貼る)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm 依存の導入
        run: npm ci

      - name: cargo-about の導入
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about

      - name: サードパーティライセンス本文の生成
        working-directory: src-tauri
        run: cargo about generate about.hbs -o ../THIRD_PARTY_LICENSES.html

      - name: Tauri ビルドとドラフトリリース作成
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Personacle ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            (公開前に docs/release-notes-*.md の内容に差し替えてください)

            > 注意: コード署名をしていないため、初回実行時に Windows SmartScreen の警告が表示されます。「詳細情報」→「実行」で続行できます。

      - name: ライセンス本文をリリースに添付
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} THIRD_PARTY_LICENSES.html --clobber
